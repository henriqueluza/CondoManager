<div class="min-h-screen bg-[#f0eeea] flex items-center justify-center">
  <div class="grid grid-cols-2 w-[860px] min-h-[520px] bg-white rounded-2xl shadow-2xl overflow-hidden">

    <!-- Lado esquerdo -->
    <div class="bg-[#f7f6f2] flex flex-col items-center justify-center p-12 gap-7">
      <svg class="w-64 h-64" viewBox="0 0 280 280" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="60" y="100" width="160" height="140" rx="4" fill="#e8e6e0"/>
        <rect x="60" y="100" width="160" height="12" rx="2" fill="#d4d0c8"/>
        <rect x="80" y="125" width="28" height="22" rx="3" fill="#c8d8f0"/>
        <rect x="126" y="125" width="28" height="22" rx="3" fill="#c8d8f0"/>
        <rect x="172" y="125" width="28" height="22" rx="3" fill="#b8cceb"/>
        <rect x="80" y="162" width="28" height="22" rx="3" fill="#b8cceb"/>
        <rect x="126" y="162" width="28" height="22" rx="3" fill="#c8d8f0"/>
        <rect x="172" y="162" width="28" height="22" rx="3" fill="#c8d8f0"/>
        <rect x="116" y="200" width="48" height="40" rx="3" fill="#bbb6ac"/>
        <circle cx="158" cy="221" r="3" fill="#999"/>
        <polygon points="140,62 40,102 240,102" fill="#ccc9c0"/>
        <polygon points="140,62 55,102 225,102" fill="#d8d4cc"/>
        <ellipse cx="42" cy="195" rx="22" ry="28" fill="#b8d4b0"/>
        <rect x="39" y="215" width="6" height="25" fill="#a0886a"/>
        <ellipse cx="238" cy="192" rx="20" ry="25" fill="#a8c8a0"/>
        <rect x="235" y="210" width="6" height="30" fill="#a0886a"/>
        <rect x="20" y="238" width="240" height="6" rx="3" fill="#d4d0c8"/>
      </svg>
      <div class="text-center">
        <p class="text-[#2a2a2a] text-xl font-light italic mb-2" style="font-family: 'Fraunces', serif">
          Seu condomínio,<br>bem administrado.
        </p>
        <p class="text-sm text-[#999] leading-relaxed">
          Gerencie membros, visitantes<br>e acessos em um só lugar.
        </p>
      </div>
    </div>

    <!-- Lado direito -->
    <div class="p-12 flex flex-col justify-center">

      <!-- Tabs -->
      <div class="flex border-b border-gray-200 mb-9">
        <button class="pb-3 mr-7 text-sm font-medium text-[#1a1a1a] border-b-2 border-[#1a1a1a] -mb-px">
          Entrar
        </button>
        <button class="pb-3 mr-7 text-sm font-medium text-gray-300 border-b-2 border-transparent -mb-px">
          Cadastrar
        </button>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <!-- Email -->
        <div class="mb-5">
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">
            E-mail
          </label>
          <input
            formControlName="email"
            type="email"
            placeholder="seu@email.com"
            class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm text-[#1a1a1a] bg-gray-50 outline-none focus:border-[#1a1a1a] focus:bg-white transition-colors placeholder-gray-300"
          />
        </div>

        <!-- Senha -->
        <div class="mb-3">
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">
            Senha
          </label>
          <input
            formControlName="password"
            type="password"
            placeholder="••••••••"
            class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm text-[#1a1a1a] bg-gray-50 outline-none focus:border-[#1a1a1a] focus:bg-white transition-colors placeholder-gray-300"
          />
        </div>

        <!-- Esqueci a senha -->
        <div class="flex justify-end mb-6">
          <a href="#" class="text-xs text-gray-400 hover:text-[#1a1a1a] transition-colors">
            Esqueci minha senha
          </a>
        </div>

        <!-- Botão -->
        <button
          type="submit"
          class="w-full py-3 bg-[#1a1a1a] text-white text-sm font-semibold rounded-lg hover:opacity-80 transition-opacity"
        >
          Entrar
        </button>
      </form>

    </div>
  </div>
</div>
